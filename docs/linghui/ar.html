<!DOCTYPE html><html lang=zh><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>灵绘 AR</title>
<style>
*{margin:0;padding:0}body{background:#000;overflow:hidden}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;font-family:sans-serif;z-index:50;text-align:center;pointer-events:none}
#err{position:fixed;bottom:60px;left:10px;right:10px;color:#f44;font-size:13px;font-family:monospace;z-index:50;text-align:center;word-break:break-all}
</style></head>
<body>
<div id=msg>📱 灵绘 AR<br><small>检查设备支持中...</small></div>
<div id=err></div>
<script>
var log='';
function elog(s){log+=s+'<br>';document.getElementById('err').innerHTML=log;console.log(s)}

elog('检测WebXR...');
if(typeof navigator.xr==='undefined'){
  document.getElementById('msg').innerHTML='❌ 浏览器不支持XR<br><small>需Chrome M81+</small>';
  elog('navigator.xr 不存在');
}else{
  elog('navigator.xr 存在');
  navigator.xr.isSessionSupported('immersive-ar').then(function(ok){
    elog('immersive-ar支持: '+ok);
    if(ok){
      document.getElementById('msg').innerHTML='✅ 支持AR!<br><small>点屏幕进入</small>';
      document.body.addEventListener('click',startAR,{once:true});
      document.body.addEventListener('touchend',function(e){e.preventDefault();startAR()},{once:true});
    }else{
      // 试inline
      navigator.xr.isSessionSupported('inline').then(function(ok2){
        elog('inline支持: '+ok2);
      });
      document.getElementById('msg').innerHTML='❌ 设备不支持AR<br><small>红米Note13阉割了ARCore</small>';
    }
  }).catch(function(e){
    elog('检测失败: '+e.message);
    document.getElementById('msg').innerHTML='❌ XR检测出错<br><small>'+e.message.substring(0,50)+'</small>';
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
var scene,cam,R,nezha;

function buildNezha(){
  var G=new THREE.Group();
  var skin=new THREE.MeshStandardMaterial({color:0xf5dcc3,roughness:0.5});
  var vest=new THREE.MeshStandardMaterial({color:0xcc2222,roughness:0.55});
  var hair=new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.4});
  var pants=new THREE.MeshStandardMaterial({color:0x3a3a45,roughness:0.65});
  var gold=new THREE.MeshStandardMaterial({color:0xdaa520,roughness:0.15,metalness:0.95});
  var eyeM=new THREE.MeshStandardMaterial({color:0x000000,roughness:0.05,emissive:0x220000});
  var sashM=new THREE.MeshStandardMaterial({color:0xdd2222,roughness:0.3,emissive:0x220000,side:THREE.DoubleSide});
  function M(g,m,x,y,z,rx,ry,rz,sx,sy,sz){
    rx=rx||0;ry=ry||0;rz=rz||0;sx=sx||1;sy=sy||1;sz=sz||1;
    var o=new THREE.Mesh(g,m);o.position.set(x,y,z);o.rotation.set(rx,ry,rz);o.scale.set(sx,sy,sz);o.castShadow=true;return o;
  }
  G.add(M(new THREE.CapsuleGeometry(0.18,0.3,8,12),vest,0,0.65,0));
  G.add(M(new THREE.CylinderGeometry(0.06,0.07,0.08,10),skin,0,0.88,0));
  G.add(M(new THREE.SphereGeometry(0.16,22,22),skin,0,1.04,0));
  G.add(M(new THREE.SphereGeometry(0.04,10,10),eyeM,-0.05,1.08,-0.14));
  G.add(M(new THREE.SphereGeometry(0.04,10,10),eyeM,0.05,1.08,-0.14));
  G.add(M(new THREE.BoxGeometry(0.06,0.01,0.02),hair,-0.06,1.13,-0.13,0,0,-0.25));
  G.add(M(new THREE.BoxGeometry(0.06,0.01,0.02),hair,0.06,1.13,-0.13,0,0,0.25));
  for(var s=-1;s<=1;s+=2){
    G.add(M(new THREE.TorusGeometry(0.07,0.032,10,16),hair,s*0.14,1.2,0,Math.PI/2,0,0));
    G.add(M(new THREE.SphereGeometry(0.055,10,10),hair,s*0.14,1.2,0));
    var rope=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.008,0.22,8),new THREE.MeshStandardMaterial({color:0xff2222,roughness:0.2,emissive:0x330000}));
    rope.position.set(s*0.18,1.1,-0.05);rope.rotation.set(0.3*s,0,0.1);rope.castShadow=true;G.add(rope);
  }
  return G;
}

function initScene(){
  scene=new THREE.Scene();
  cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.01,20);
  R=new THREE.WebGLRenderer({antialias:true,alpha:true});
  R.setPixelRatio(Math.min(devicePixelRatio,2));R.setSize(innerWidth,innerHeight);
  document.body.appendChild(R.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,1.5));
  scene.add(new THREE.DirectionalLight(0xffffff,4)).position.set(1,2,1);
  nezha=buildNezha();
  nezha.scale.setScalar(0.3);nezha.position.set(0,0,-1);
  scene.add(nezha);
}

async function startAR(){
  try{
    elog('请求AR session...');
    var session=await navigator.xr.requestSession('immersive-ar',{});
    elog('AR session 创建成功!');
    R.xr.enabled=true;
    await R.xr.setSession(session);
    elog('session绑定成功');
    R.setAnimationLoop(function(t,frame){R.render(scene,cam)});
    document.getElementById('msg').innerHTML='✅ AR已启动';
  }catch(e){
    elog('失败: '+e.message);
    document.getElementById('msg').innerHTML='❌ AR失败<br><small>'+e.message.substring(0,60)+'</small>';
  }
}

initScene();
function loop(t){
  requestAnimationFrame(loop);
  if(R&&!R.xr.isPresenting){nezha.rotation.y+=0.005;R.render(scene,cam)}
}
requestAnimationFrame(loop);
window.addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
</script></body></html>
