<!DOCTYPE html><html lang=zh><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,user-scalable=no"><title>灵绘</title>
<link rel=manifest href=manifest.json>
<meta name=mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-capable content=yes>
<style>*{margin:0;padding:0}body{background:#0a0808;overflow:hidden}#load{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff4400;font-size:18px;font-family:sans-serif;z-index:10;text-align:center}#bar{width:200px;height:4px;background:#333;margin:10px auto;border-radius:2px}#bar div{height:100%;background:#ff4400;border-radius:2px;transition:width .3s}</style></head>
<body><div id=load>🔥 灵绘加载中...<div id=bar><div id=prog style=width:0></div></div></div>
<script type=importmap>{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type=module>
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const L=document.getElementById('load'),P=document.getElementById('prog');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0808);
scene.fog=new THREE.Fog(0x0a0808,2,15);

const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,20);
cam.position.set(0.5,0.6,2.2);cam.lookAt(0,0.5,0);

const r=new THREE.WebGLRenderer({antialias:true});
r.setPixelRatio(Math.min(devicePixelRatio,2));
r.setSize(innerWidth,innerHeight);
r.shadowMap.enabled=true;r.shadowMap.type=THREE.PCFSoftShadowMap;
r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.3;
document.body.appendChild(r.domElement);

scene.add(new THREE.AmbientLight(0x331111,1.2));
const sun=new THREE.DirectionalLight(0xffaa66,12);
sun.position.set(2,3,3);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=0.1;sun.shadow.camera.far=20;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0xff4422,4)).position.set(-1,0.5,-0.5);
scene.add(new THREE.DirectionalLight(0x2244ff,2)).position.set(0,-0.5,1);

const ringGeo=new THREE.TorusGeometry(0.35,0.02,16,64);
const ringMat=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.7});
const ring=new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x=-Math.PI/2;ring.position.y=-0.6;ring.receiveShadow=true;
scene.add(ring);

const pg=new THREE.BufferGeometry();
const pp=new Float32Array(200*3);
for(let i=0;i<200;i++){pp[i*3]=(Math.random()-0.5)*1.5;pp[i*3+1]=Math.random()*0.8-0.5;pp[i*3+2]=(Math.random()-0.5)*0.5}
pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
const pm=new THREE.PointsMaterial({color:0xff6600,size:0.02,blending:THREE.AdditiveBlending,depthWrite:false});
const pts=new THREE.Points(pg,pm);scene.add(pts);

const ctrl=new OrbitControls(cam,r.domElement);
ctrl.target.set(0,0.5,0);ctrl.enableDamping=true;ctrl.dampingFactor=0.1;
ctrl.minDistance=1;ctrl.maxDistance=5;ctrl.maxPolarAngle=Math.PI*0.7;
ctrl.autoRotate=true;ctrl.autoRotateSpeed=0.8;ctrl.update();

let model;

const loader=new GLTFLoader();
loader.load('nezha.glb',
  gltf=>{
    model=gltf.scene;
    model.scale.setScalar(1.3);
    model.position.y=-0.25;
    model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;n.material=new THREE.MeshStandardMaterial({color:0xdd3333,roughness:0.6,metalness:0.1})}});
    scene.add(model);
    L.style.display='none';
  },
  p=>{if(p.total>0){P.style.width=(p.loaded/p.total*100)+'%';L.innerHTML='🔥 '+Math.round(p.loaded/1024)+'KB / '+Math.round(p.total/1024)+'KB<div id=bar><div id=prog style=width:'+(p.loaded/p.total*100)+'%></div></div>'}},
  err=>{L.innerHTML='加载失败<br><small>'+err.message+'</small><br><a href=javascript:location.reload() style=color:#ff4400>重试</a>'}
);

function loop(t){
  requestAnimationFrame(loop);
  const s=1+Math.sin(t*0.003)*0.02;
  ring.scale.setScalar(s);
  ring.material.opacity=0.5+Math.sin(t*0.005)*0.2;
  pts.rotation.y+=0.003;
  if(model) model.rotation.y=Math.sin(t*0.001)*0.15;
  ctrl.update();
  r.render(scene,cam);
}
requestAnimationFrame(loop);
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script></body></html>
