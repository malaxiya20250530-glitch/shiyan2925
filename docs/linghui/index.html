<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>灵绘 · 桌面精灵</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0618;color:#e0ddd5;font-family:"PingFang SC","Noto Sans SC",sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* ── 背景层 ── */
#starsC{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#orbCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
#vizBar{position:fixed;bottom:90px;left:0;right:0;height:64px;z-index:85;pointer-events:none;display:none}
#vizBar.show{display:block}

/* ── 顶部栏 ── */
#header{position:relative;z-index:100;background:linear-gradient(135deg,#1a0a0a88,#2a101588);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#header .logo{font-size:20px;font-weight:bold;background:linear-gradient(135deg,#ff4400,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#header .status{font-size:10px;padding:3px 10px;border-radius:10px;margin-left:auto;transition:all .3s}
#header .status.on{background:#1a3a1a;color:#4f4}
#header .status.off{background:#3a1a1a;color:#f44}
#arLink{color:#ff8800;text-decoration:none;font-size:12px;padding:4px 10px;border-radius:12px;border:1px solid #ff880044}

/* ── 主内容区 ── */
#main{position:relative;z-index:50;flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── 对话页 ── */
#chatPage{display:flex;flex-direction:column;height:100%}
#messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#ff4400,#cc3300);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:rgba(26,20,24,.92);border:1px solid #ff440033;border-bottom-left-radius:4px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.msg .time{font-size:10px;opacity:.5;margin-top:4px;text-align:right}

/* ── 打字指示器 ── */
.typing{display:flex;align-items:center;gap:4px;padding:8px 14px}
.typing span{width:7px;height:7px;border-radius:50%;background:#ff4400;animation:typeBounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeBounce{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-6px)}}

/* ── 情绪徽章 ── */
.emBadge{display:inline-block;font-size:18px;margin-right:6px;vertical-align:middle;animation:popIn .3s}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

/* ── 记忆面板 ── */
#memPanel{position:fixed;top:0;right:-280px;width:260px;height:100%;z-index:200;background:rgba(10,6,24,.97);border-left:1px solid #ff440033;padding:14px;overflow-y:auto;transition:right .3s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
#memPanel.show{right:0}
#memPanel h3{color:#ff8800;font-size:14px;margin-bottom:12px}
#memPanel .memItem{background:rgba(255,136,0,.06);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#aaa;border-left:2px solid #ff440044}
#inputRow{display:flex;gap:8px;padding:8px 12px;flex-shrink:0;background:rgba(10,6,24,.9);border-top:1px solid #ff440022}
#inputRow input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ff440044;background:rgba(26,20,24,.8);color:#e0ddd5;font-size:14px;outline:none}
#inputRow input:focus{border-color:#ff4400}
#inputRow button{width:40px;height:40px;border-radius:50%;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
#inputRow .sendBtn{background:linear-gradient(135deg,#ff4400,#cc3300)}
#inputRow .micBtn{background:#ff440022;color:#ff6600}
#inputRow .micBtn.recording{background:#f44;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── 音乐页 ── */
#musicPage{display:none;flex-direction:column;gap:10px;padding:10px 12px;overflow-y:auto;height:100%}
#nowPlaying{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,136,0,.08);border-radius:12px}
#nowPlaying .cover{width:44px;height:44px;border-radius:8px;background:rgba(255,136,0,.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
#nowPlaying .info{flex:1;min-width:0}
#nowPlaying .title{color:#fff;font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#nowPlaying .artist{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px}
#playerCtl{display:flex;align-items:center;gap:10px;margin-bottom:4px}
#playerCtl button{width:34px;height:34px;border-radius:50%;border:none;font-size:16px;cursor:pointer;background:rgba(255,136,0,.12);color:#f80;display:flex;align-items:center;justify-content:center}
#playerCtl .playBtn{width:42px;height:42px;background:#f80;color:#fff;font-size:20px}
#timeInfo{display:flex;justify-content:space-between;color:rgba(255,255,255,.35);font-size:10px;margin-bottom:6px}
#timeBar{flex:1;height:3px;background:rgba(255,136,0,.15);border-radius:2px;cursor:pointer;position:relative;margin-bottom:6px}
#timeBar div{height:100%;background:#f80;border-radius:2px;width:0;transition:width .1s linear}
#volCtl{display:flex;align-items:center;gap:6px;margin-bottom:8px}
#volCtl span{color:rgba(255,255,255,.35);font-size:14px}
#volCtl input{flex:1;accent-color:#f80}
#musicActions{display:flex;gap:6px;margin-bottom:6px}
#musicActions button{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,136,0,.15);background:rgba(255,136,0,.06);color:#f80;font-size:12px;cursor:pointer}
#musicSearch{display:none;margin-bottom:6px}
#musicSearch input{width:100%;padding:8px 12px;background:rgba(26,20,24,.8);border:1px solid rgba(255,136,0,.2);color:#fff;border-radius:8px;font-size:13px;outline:none}
#searchResults,#playlist{max-height:35vh;overflow-y:auto}
.songItem{display:flex;align-items:center;gap:8px;padding:10px 8px;border-bottom:1px solid rgba(255,136,0,.05);cursor:pointer;transition:background .15s}
.songItem:active{background:rgba(255,136,0,.1)}
.songItem .sIdx{color:rgba(255,255,255,.25);font-size:11px;width:18px;text-align:center;flex-shrink:0}
.songItem .sInfo{flex:1;min-width:0}
.songItem .sTitle{color:#ddd;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.songItem .sArtist{color:rgba(255,255,255,.35);font-size:11px;margin-top:2px}
.songItem .sBtn{color:#f80;font-size:16px;flex-shrink:0;padding:4px}
#fileInput{display:none}

/* ── 语音页 ── */
#voicePage{display:none;flex-direction:column;align-items:center;gap:18px;padding:24px 16px;overflow-y:auto;height:100%}
.wake-row{display:flex;align-items:center;gap:10px;font-size:14px}
.wake-switch{position:relative;width:48px;height:26px;background:#333;border-radius:13px;cursor:pointer;transition:background .3s}
.wake-switch.on{background:#ff4400}
.wake-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .3s}
.wake-switch.on::after{transform:translateX(22px)}
.wake-label{font-size:11px;color:#888}
.voice-mic{width:90px;height:90px;border-radius:50%;border:3px solid #ff4400;background:rgba(255,68,0,.08);color:#ff4400;font-size:32px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.voice-mic.recording{background:#ff4400;color:#fff;box-shadow:0 0 30px #ff440066;animation:pulse 1.5s infinite}
.voice-status{font-size:11px;color:#666}
#transcript{text-align:center;font-size:15px;color:#ff8800;min-height:22px;padding:0 16px;max-width:280px}
#voiceReply{text-align:center;font-size:13px;color:#aaa;padding:0 16px;max-width:280px}
#wakeIndicator{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);z-index:60;color:#f80;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;background:rgba(0,0,0,.75);padding:8px 18px;border-radius:20px}
#wakeIndicator.show{opacity:1}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:120;color:#fff;font-size:13px;background:rgba(255,136,0,.85);padding:8px 16px;border-radius:16px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ── 迷你播放条（全局底部） ── */
#miniPlayer{position:fixed;bottom:48px;left:0;right:0;z-index:90;background:rgba(10,6,24,.95);border-top:1px solid #ff440033;padding:8px 12px;display:none;align-items:center;gap:10px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#miniPlayer.show{display:flex}
#miniPlayer .mpCover{width:36px;height:36px;border-radius:6px;background:rgba(255,136,0,.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
#miniPlayer .mpInfo{flex:1;min-width:0}
#miniPlayer .mpTitle{color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#miniPlayer .mpArtist{color:rgba(255,255,255,.35);font-size:10px;margin-top:1px}
#miniPlayer .mpBtn{width:32px;height:32px;border-radius:50%;border:none;font-size:14px;cursor:pointer;background:rgba(255,136,0,.15);color:#f80;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#miniPlayer .mpBtn.playBtn{background:#f80;color:#fff}

/* ── 底部标签栏 ── */
#tabs{position:relative;z-index:100;display:flex;border-top:1px solid #ff440022;background:rgba(10,6,24,.95);flex-shrink:0;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.tab{flex:1;padding:10px 0;text-align:center;color:#666;font-size:13px;cursor:pointer;border:none;background:none;transition:color .2s}
.tab.active{color:#ff4400}
.tab .tabIcon{font-size:18px;display:block;margin-bottom:2px}

/* ── 3D模型页 ── */
#modelPage{display:none;flex-direction:column;align-items:center;height:100%;position:relative}
model-viewer{width:100%;height:60%;background:radial-gradient(circle at center,#1a0a2e88,#0a0618);--progress-bar-color:#ff8800;--progress-bar-height:3px}
#modelControls{display:flex;gap:8px;padding:12px;flex-wrap:wrap;justify-content:center}
#modelControls button{padding:8px 16px;border-radius:16px;border:1px solid #ff440044;background:rgba(255,68,0,.08);color:#ff8800;font-size:13px;cursor:pointer;transition:all .2s}
#modelControls button:active{background:rgba(255,68,0,.2)}
#modelControls button.active{background:#ff4400;color:#fff;border-color:#ff4400}
#modelEmotion{color:#ff8800;font-size:14px;text-align:center;padding:8px}
</style>
</head>
<body>

<canvas id=starsC></canvas>
<canvas id=orbCanvas></canvas>
<canvas id=vizBar></canvas>
<div id=wakeIndicator>🔔 灵绘已唤醒！</div>
<div id=toast class=toast></div>

<div id=header>
  <span class=logo>🔥 灵绘</span>
  <span class="status off" id=connDot>● 离线</span>
  <button id=memBtn onclick=toggleMem() style="background:none;border:1px solid #ff440044;color:#ff8800;border-radius:12px;padding:4px 10px;font-size:12px;cursor:pointer">🧠 记忆</button><a id=arLink href=ar.html>📱 AR</a>
</div>

<div id=main>
  <!-- 对话页 -->
  <div id=chatPage>
    <div id=messages>
      <div class="msg ai">你好！我是灵绘，你的桌面精灵～可以聊天、放音乐、听你说话 ✨</div>
    </div>
    <div id=inputRow>
      <button class=micBtn id=micBtn title=语音>🎤</button>
      <input id=chatInput placeholder="和灵绘说点什么..." autocomplete=off enterkeyhint=send>
      <button class=sendBtn id=sendBtn title=发送>➤</button>
    </div>
  </div>


  <!-- 3D模型 -->
  <div id="modelPage">
    <model-viewer id="nezhaViewer" src="nezha.glb"
      camera-controls auto-rotate autoplay
      animation-name="Idle"
      exposure="1" shadow-intensity="0.6"
      environment-image="neutral"
      camera-orbit="0deg 75deg 3.5m"
      min-camera-orbit="auto auto 1.5m"
      max-camera-orbit="auto auto 8m"
      interaction-prompt="auto"
      ar ar-modes="webxr scene-viewer quick-look">
      <div class="progress-bar hide" slot="progress-bar"></div>
    </model-viewer>
    <div id="modelEmotion">😊 当前情绪：开心</div>
    <div id="modelControls">
      <button onclick="modelAction('wave')">👋 招手</button>
      <button onclick="modelAction('dance')">💃 跳舞</button>
      <button onclick="modelAction('spin')">🔄 旋转</button>
      <button onclick="modelAction('jump')">🦘 跳跃</button>
      <button onclick="toggleAR()">📱 AR模式</button>
    </div>
  </div>

  <!-- 音乐页 -->
  <div id=musicPage>
    <div id=nowPlaying>
      <div class=cover>🎵</div>
      <div class=info>
        <div class=title>未在播放</div>
        <div class=artist>点击歌曲开始播放</div>
      </div>
    </div>
    <div id=timeInfo><span id=curTime>00:00</span><span id=durTime>00:00</span></div>
    <div id=timeBar><div></div></div>
    <div id=playerCtl>
      <button id=btnPrev>⏮</button>
      <button id=btnPlay class=playBtn>▶</button>
      <button id=btnNext>⏭</button>
      <button id=btnMode>🔁</button>
    </div>
    <div id=volCtl>
      <span>🔈</span><input type=range id=volSlider min=0 max=100 value=70><span>🔊</span>
    </div>
    <div id=musicActions>
      <button id=btnSearch>🔍 iTunes 搜歌</button>
      <button id=btnImport>📂 本地导入</button>
    </div>
    <div id=musicSearch><input id=searchIn placeholder="搜索歌曲..." enterkeyhint=search></div>
    <div id=searchResults></div>
    <div id=playlist></div>
  </div>

  <!-- 语音页 -->
  <div id=voicePage>
    <div class=wake-row>
      <span>语音唤醒</span>
      <div class=wake-switch id=wakeSwitch onclick=toggleWake()></div>
      <span class=wake-label id=wakeLabel>关闭</span>
    </div>
    <button class=voice-mic id=voiceMicBtn onclick=toggleVoice()>🎤</button>
    <div class=voice-status id=voiceStatus>点击麦克风开始说话</div>
    <div id=transcript></div>
    <div id=voiceReply></div>
  </div>
</div>

<!-- 迷你播放条（全局） -->
<div id=miniPlayer>
  <div class=mpCover>🎵</div>
  <div class=mpInfo>
    <div class=mpTitle>未在播放</div>
    <div class=mpArtist></div>
  </div>
  <button class="mpBtn playBtn" id=mpPlay onclick=toggleMiniPlay()>▶</button>
  <button class=mpBtn onclick=switchTab('musicPage') title=展开>📋</button>
</div>

<div id=tabs>
  <button class="tab active" data-page=chatPage>💬<span class=tabIcon></span>对话</button>
  <button class=tab data-page=musicPage>🎵<span class=tabIcon></span>音乐</button>
  <button class=tab data-page=voicePage>🎤<span class=tabIcon></span>语音</button>
</div>

<input type=file id=fileInput accept=audio/* multiple>

<script>
// ═══════════════════════════════════════════
//  WebSocket 连接管理
// ═══════════════════════════════════════════
var ws=null,wsReady=false,wsReconnectTimer=null;
var isAPK=(typeof window.LingHuiBridge!=='undefined');
var backendOnline=false,backendChecked=false;
var WS_URL='ws://'+location.hostname+':9527/ws';

function connectWS(){
  if(isAPK)setTimeout(function(){
    if(!backendOnline){backendChecked=true;document.getElementById('connDot').textContent='● 离线';document.getElementById('connDot').className='status off'}
  },3000);
  if(ws&&ws.readyState===WebSocket.OPEN)return;
  try{
    ws=new WebSocket(WS_URL);
    ws.onopen=function(){
      wsReady=true;backendOnline=true;backendChecked=true;
      document.getElementById('connDot').textContent='● 在线';
      document.getElementById('connDot').className='status on';
      if(wsReconnectTimer){clearInterval(wsReconnectTimer);wsReconnectTimer=null}
    };
    ws.onclose=function(){
      wsReady=false;backendOnline=false;backendChecked=true;
      document.getElementById('connDot').textContent='● 离线';
      document.getElementById('connDot').className='status off';
      if(!wsReconnectTimer)wsReconnectTimer=setInterval(connectWS,3000);
    };
    ws.onerror=function(){ws.close()};
    ws.onmessage=function(e){
      try{var m=JSON.parse(e.data);handleMsg(m)}catch(_){}
    };
  }catch(_){
    if(!wsReconnectTimer)wsReconnectTimer=setInterval(connectWS,3000);
  }
}
function sendWS(msg){
  if(wsReady&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify(msg));return}
  if(!backendChecked&&!isAPK){
    addMessage('ai','⚠ 后端未连接，请用 bash scripts/start_all.sh 启动');
  }
}
function handleMsg(m){
  switch(m.type){
    case 'pet_response':
      document.getElementById('typingInd').style.display='none';
      document.getElementById('sendBtn').disabled=false;document.getElementById('sendBtn').style.opacity='1';
      var emoji=EMOTION_ICONS[m.emotion]||'🤖';
      addMessage('ai','<span class=emBadge>'+emoji+'</span>'+m.text);
      setEmotion(m.emotion||'idle');
      if(wakeEnabled)speakText(m.text);
      if(m.memories)updateMemories(m.memories);
      break;
    case 'music_list':
      renderPlaylistFromServer(m.files);
      break;
    case 'music_downloaded':
      addMessage('ai','✅ 已下载: '+m.name);
      refreshPlaylistWS();
      break;
    case 'music_songlist':
      showSongListDialog(m.songs);
      break;
    case 'error':
      addMessage('ai','⚠ '+m.message);
      break;
  }
}

// ═══════════════════════════════════════════
//  标签切换
// ═══════════════════════════════════════════
function switchTab(pageId){
  document.getElementById('chatPage').style.display=pageId==='chatPage'?'flex':'none';
  document.getElementById('musicPage').style.display=pageId==='musicPage'?'flex':'none';
  document.getElementById('voicePage').style.display=pageId==='voicePage'?'flex':'none';
  document.getElementById('modelPage').style.display=pageId==='modelPage'?'flex':'none';
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active',t.dataset.page===pageId);
  });
  if(pageId==='musicPage')refreshPlaylistWS();
  if(pageId==='voicePage'){
    initVoice();
    if(audio&&!audio.paused)showToast('💡 录音时会自动暂停音乐');
  }
}
document.getElementById('tabs').addEventListener('click',function(e){
  var btn=e.target.closest('.tab');if(!btn)return;
  switchTab(btn.dataset.page);
});

// ═══════════════════════════════════════════
//  文本对话
// ═══════════════════════════════════════════
function sendChat(){
  var inp=document.getElementById('chatInput'),text=inp.value.trim();
  if(!text)return;
  var btn=document.getElementById('sendBtn');
  addMessage('user',text);inp.value='';btn.disabled=true;btn.style.opacity='0.5';
  document.getElementById('typingInd').style.display='flex';
  document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
  sendWS({type:'user_input',text:text,context:{}});
}
document.getElementById('sendBtn').addEventListener('click',sendChat);
document.getElementById('chatInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')sendChat();
});

function addMessage(role,text){
  var div=document.createElement('div');
  div.className='msg '+role;
  var now=new Date();
  div.innerHTML=text+'<div class=time>'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+'</div>';
  var msgs=document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

// ═══════════════════════════════════════════
//  语音对话
// ═══════════════════════════════════════════
var recognition=null,isListening=false;
var isHTTPS=(location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1');

if(('webkitSpeechRecognition' in window||'SpeechRecognition' in window)&&isHTTPS){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='zh-CN';recognition.interimResults=false;recognition.continuous=false;
  recognition.onresult=function(e){
    var text=e.results[0][0].transcript.trim();
    document.getElementById('transcript').textContent=text;
    document.getElementById('voiceReply').textContent='';
    addMessage('user','🎤 '+text);
    sendWS({type:'user_input',text:text,context:{}});
    if(continuousMode&&isListening)setTimeout(startListening,1000);
    else if(!continuousMode&&isListening){isListening=false;stopListening()}
  };
  recognition.onerror=function(e){

// ═══════════════════════════════════════════
//  语音唤醒 + 语音页
// ═══════════════════════════════════════════
var wakeEnabled=false,wakeRecognition=null,lastWakeTime=0;
var WAKE_COOLDOWN=2500;
var WAKE_WORDS=['你好灵绘','灵绘','嘿灵绘','小灵','灵灵'];

function toggleWake(){
  wakeEnabled=!wakeEnabled;
  var sw=document.getElementById('wakeSwitch'),lb=document.getElementById('wakeLabel');
  if(wakeEnabled){
    sw.classList.add('on');
    lb.textContent='开启 ('+WAKE_WORDS.slice(0,2).join('/')+')';
    startWakeListening();
  }else{
    sw.classList.remove('on');lb.textContent='关闭';
    stopWakeListening();
  }
}
function startWakeListening(){
  if(!isHTTPS||!('webkitSpeechRecognition' in window||'SpeechRecognition' in window))return;
  if(wakeRecognition)return;
  try{
    var SR2=window.SpeechRecognition||window.webkitSpeechRecognition;
    wakeRecognition=new SR2();wakeRecognition.lang='zh-CN';wakeRecognition.continuous=true;wakeRecognition.interimResults=true;
    wakeRecognition.maxAlternatives=3;
    wakeRecognition.onresult=function(e){
      var now=Date.now();
      if(now-lastWakeTime<WAKE_COOLDOWN)return;
      var transcripts=[];
      for(var i=e.resultIndex;i<e.results.length;i++){
        for(var j=0;j<e.results[i].length;j++){
          transcripts.push(e.results[i][j].transcript.trim().toLowerCase());
        }
      }
      var woke=false;
      for(var k=0;k<transcripts.length;k++){
        for(var w=0;w<WAKE_WORDS.length;w++){
          if(transcripts[k]===WAKE_WORDS[w].toLowerCase()||transcripts[k].startsWith(WAKE_WORDS[w].toLowerCase())){
            woke=true;break;
          }
        }
        if(woke)break;
      }
      if(woke){
        lastWakeTime=now;
        document.getElementById('wakeIndicator').classList.add('show');
        setTimeout(function(){document.getElementById('wakeIndicator').classList.remove('show')},1500);
        var btn=document.getElementById('voiceMicBtn');
        btn.style.boxShadow='0 0 40px #ff4400';
        setTimeout(function(){btn.style.boxShadow=''},500);
        isListening=true;startListening();
      }
    };
    wakeRecognition.onerror=function(){wakeActiveStop()};
    wakeRecognition.onend=function(){if(wakeEnabled)try{wakeRecognition.start()}catch(_){wakeActiveStop()}};
    wakeRecognition.start();
    document.getElementById('voiceStatus').textContent='后台监听唤醒词中...';
  }catch(_){wakeActiveStop()}
}
function wakeActiveStop(){wakeEnabled=false;document.getElementById('wakeSwitch').classList.remove('on');document.getElementById('wakeLabel').textContent='关闭';wakeRecognition=null}
function stopWakeListening(){
  if(wakeRecognition){try{wakeRecognition.stop()}catch(_){}wakeRecognition=null}
  document.getElementById('voiceStatus').textContent='点击麦克风开始说话';
}
function toggleVoice(){
  if(!recognition){showToast('⚠ 语音功能需要 HTTPS 或本地连接');return}
  if(isListening){isListening=false;stopListening()}
  else{
    if(wakeEnabled){stopWakeListening();wakeEnabled=false;document.getElementById('wakeSwitch').classList.remove('on');document.getElementById('wakeLabel').textContent='关闭'}
    isListening=true;startListening();
  }
}
function initVoice(){
  var canVoice=isHTTPS||isAPK;
  if(!recognition&&canVoice){
    var SR3=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR3();recognition.lang='zh-CN';recognition.interimResults=false;recognition.continuous=false;
    recognition.onresult=function(e){
      var text=e.results[0][0].transcript.trim();
      document.getElementById('transcript').textContent=text;
      document.getElementById('voiceReply').textContent='';
      addMessage('user','🎤 '+text);
      sendWS({type:'user_input',text:text,context:{}});
      if(isListening)setTimeout(startListening,1500);
    };
    recognition.onerror=function(e){
      if(e.error==='no-speech'){if(isListening)setTimeout(startListening,500)}
      else if(e.error!=='aborted')document.getElementById('voiceStatus').textContent='识别异常: '+e.error;
    };
    recognition.onend=function(){
      document.getElementById('voiceMicBtn').classList.remove('recording');
      if(isListening&&!wakeEnabled){isListening=false;document.getElementById('voiceStatus').textContent='点击麦克风开始说话'}
    };
  }
}

//  TTS 语音合成
// ═══════════════════════════════════════════
var synth=window.speechSynthesis||null;
function speakText(text){
  if(!synth)return;
  synth.cancel();
  var oldVol=audio.volume;
  if(!audio.paused){audio.volume=Math.max(0.08,oldVol*0.25)}
  var u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.volume=.85;
  // 情绪驱动语调
  var emoPitch={happy:1.3,excited:1.4,sad:0.75,angry:0.85,sleepy:0.7,curious:1.15};
  var emoRate={happy:1.2,excited:1.3,sad:0.85,angry:1.1,sleepy:0.8,curious:1.0};
  u.pitch=emoPitch[currentEmotion]||1.1;u.rate=emoRate[currentEmotion]||1.1;
  // 尝试选中文语音
  var voices=synth.getVoices().filter(function(v){return v.lang.startsWith('zh')});
  if(voices.length)u.voice=voices[0];
  u.onend=function(){audio.volume=oldVol};
  synth.speak(u);
}

// ═══════════════════════════════════════════
//  音乐频谱可视化（12小球随音乐跳动）
// ═══════════════════════════════════════════
var audioCtx=null,analyser=null,vizAnimId=null;
var BALL_COUNT=12;

function initAudioContext(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=64;
    analyser.smoothingTimeConstant=0.7;
    var source=audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }catch(e){audioCtx=null;analyser=null}
}

function startViz(){
  if(!analyser){initAudioContext();}
  if(!analyser)return;
  var cv=document.getElementById('vizBar');
  cv.classList.add('show');
  if(vizAnimId)cancelAnimationFrame(vizAnimId);
  var ctx=cv.getContext('2d');
  var freqData=new Uint8Array(analyser.frequencyBinCount);
  var w,h;

  function resizeViz(){
    w=cv.parentNode.clientWidth||innerWidth;
    h=64;
    cv.width=w;cv.height=h;
  }
  resizeViz();

  function draw(){
    vizAnimId=requestAnimationFrame(draw);
    analyser.getByteFrequencyData(freqData);
    ctx.clearRect(0,0,w,h);

    var bandSize=Math.floor(freqData.length/BALL_COUNT);
    var ballRadius=Math.min(w/BALL_COUNT/3,18);
    var spacing=w/(BALL_COUNT+1);
    var baseY=h*0.65;

    for(var i=0;i<BALL_COUNT;i++){
      var start=i*bandSize;
      var sum=0;
      for(var j=start;j<start+bandSize&&j<freqData.length;j++){sum+=freqData[j]}
      var avg=sum/bandSize/255;

      var x=spacing*(i+1);
      var r=ballRadius*(0.45+avg*1.2);
      var y=baseY-avg*h*0.4;
      var alpha=0.35+avg*0.65;

      // 发光
      var glow=ctx.createRadialGradient(x,y,r*0.3,x,y,r*2.5);
      glow.addColorStop(0,orbColor);
      glow.addColorStop(0.4,orbColor+'66');
      glow.addColorStop(1,'transparent');
      ctx.fillStyle=glow;
      ctx.beginPath();ctx.arc(x,y,r*2.5,0,Math.PI*2);ctx.fill();

      // 球体
      var grd=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
      grd.addColorStop(0,'#ffffff');
      grd.addColorStop(0.2,orbColor);
      grd.addColorStop(1,orbColor+'44');
      ctx.globalAlpha=alpha;
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  draw();
  window.addEventListener('resize',resizeViz);
}

function stopViz(){
  if(vizAnimId){cancelAnimationFrame(vizAnimId);vizAnimId=null}
  document.getElementById('vizBar').classList.remove('show');
}

// ═══════════════════════════════════════════
//  发光小球 (Canvas)
// ═══════════════════════════════════════════
var orbColor='#ff8800',currentEmotion='idle';
var EMOTION_COLORS={happy:'#ffcc00',sad:'#4488ff',angry:'#ff3333',curious:'#cc66ff',idle:'#ff8800',excited:'#ff6600',sleepy:'#8888cc'};
(function drawOrb(){
  var cv=document.getElementById('orbCanvas'),w=innerWidth,h=innerHeight;
  cv.width=w;cv.height=h;var ctx=cv.getContext('2d');
  var cx=w/2,cy=h*0.38,r=Math.min(w,h)*0.16,t=0;
  function loop(){
    t+=0.02;ctx.clearRect(0,0,w,h);
    for(var i=3;i>=0;i--){
      var g=ctx.createRadialGradient(cx,cy,r*0.4,cx,cy,r*(1.8+i*0.6));
      g.addColorStop(0,orbColor);g.addColorStop(0.3,orbColor+'88');
      g.addColorStop(0.6,orbColor+'22');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r*(1.8+i*0.6),0,Math.PI*2);ctx.fill();
    }
    var br=1+Math.sin(t)*0.06;
    var g2=ctx.createRadialGradient(cx-r*0.25,cy-r*0.25,r*0.1,cx,cy,r*br);
    g2.addColorStop(0,'#ffffff');g2.addColorStop(0.15,orbColor);
    g2.addColorStop(0.5,orbColor+'cc');g2.addColorStop(1,orbColor+'44');
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(cx,cy,r*br,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.ellipse(cx-r*0.2,cy-r*0.35,r*0.25,r*0.12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.5)';var es=r*0.08;
    ctx.beginPath();ctx.arc(cx-r*0.18,cy-r*0.05,es,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.18,cy-r*0.05,es,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=r*0.04;ctx.lineCap='round';
    ctx.beginPath();
    var mouths={happy:'arc',sad:'arcDown',angry:'flat',excited:'open'};
    var mouth=mouths[currentEmotion]||'smile';
    if(mouth==='arc')ctx.arc(cx,cy+r*0.02,r*0.1,0.1,Math.PI-0.1);
    else if(mouth==='arcDown')ctx.arc(cx,cy+r*0.25,r*0.1,Math.PI+0.1,-0.1);
    else if(mouth==='open')ctx.ellipse(cx,cy+r*0.1,r*0.08,r*0.06,0,0,Math.PI*2);
    else{ctx.moveTo(cx-r*0.1,cy+r*0.12);ctx.lineTo(cx+r*0.1,cy+r*0.12)}
    ctx.stroke();
    requestAnimationFrame(loop);
  }
  loop();
  window.addEventListener('resize',function(){w=innerWidth;h=innerHeight;cv.width=w;cv.height=h;cx=w/2;cy=h*0.38;r=Math.min(w,h)*0.16});
})();

// ═══════════════════════════════════════════
//  星空
// ═══════════════════════════════════════════
(function drawStars(){
  var cv=document.getElementById('starsC'),w=innerWidth,h=innerHeight;cv.width=w;cv.height=h;
  var ctx=cv.getContext('2d'),stars=[];
  for(var i=0;i<80;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.6+0.3,a:Math.random()*0.5+0.2});
  function render(){ctx.clearRect(0,0,w,h);
    stars.forEach(function(s){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,100,30,'+s.a+')';ctx.fill()});
  }
  render();
  window.addEventListener('resize',function(){w=innerWidth;h=innerHeight;cv.width=w;cv.height=h;render()});
})();

// ═══════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════
function showToast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show')},2200);
}
function setEmotion(em){
  currentEmotion=em||'idle';orbColor=EMOTION_COLORS[currentEmotion]||EMOTION_COLORS.idle;
  // 同步 3D 模型情绪
  var el=document.getElementById('modelEmotion');
  if(el)el.textContent=(EMOTION_ICONS[currentEmotion]||'🤖')+' 当前情绪：'+({happy:'开心',sad:'难过',angry:'生气',curious:'好奇',idle:'待机',excited:'兴奋',sleepy:'困倦'}[currentEmotion]||'正常');
}
var EMOTION_ICONS={happy:'😊',sad:'😢',angry:'😤',curious:'🤔',idle:'🤖',excited:'🤩',sleepy:'😴'};
var memOpen=false;
function toggleMem(){memOpen=!memOpen;document.getElementById('memPanel').style.right=memOpen?'0':'-280px'}
function updateMemories(mems){
  var el=document.getElementById('memList'),h='';
  mems.slice(0,10).forEach(function(m){h+='<div class=memItem>'+m+'</div>'});
  el.innerHTML=h||'<div style="color:rgba(255,255,255,.3);font-size:12px">暂无记忆</div>';
}


// ═══════════════════════════════════════════
//  3D 模型控制
// ═══════════════════════════════════════════
var modelViewer=null;
function getModelViewer(){if(!modelViewer)modelViewer=document.getElementById('nezhaViewer');return modelViewer}
function modelAction(action){
  var mv=getModelViewer();if(!mv)return;
  switch(action){
    case 'wave':mv.cameraOrbit='0deg 75deg 2.5m';setTimeout(function(){mv.cameraOrbit='0deg 75deg 3.5m'},1500);showToast('👋 哪吒向你招手~');break;
    case 'dance':mv.autoRotate=true;mv.animationName='Dance';mv.play({repetitions:2});showToast('💃 哪吒开始跳舞！');break;
    case 'spin':mv.autoRotate=!mv.autoRotate;mv.turntableRotation=8;setTimeout(function(){mv.turntableRotation=0},3000);showToast(mv.autoRotate?'🔄 自动旋转开启':'🔄 自动旋转关闭');break;
    case 'jump':mv.cameraOrbit='0deg 45deg 1.8m';setTimeout(function(){mv.cameraOrbit='0deg 75deg 3.5m'},800);showToast('🦘 哪吒跳起来了！');break;
  }
}
function toggleAR(){
  var mv=getModelViewer();if(!mv)return;
  if(mv.canActivateAR){mv.activateAR();showToast('📱 进入AR模式')}
  else showToast('⚠ 当前设备不支持AR');
}
window.addEventListener('load',function(){
  // model-viewer 加载完成后初始化
  var mv=getModelViewer();
  if(mv)mv.addEventListener('load',function(){showToast('🧿 哪吒已就位！')});
});

// ═══════════════════════════════════════════
//  启动
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
//  PWA 安装提示
// ═══════════════════════════════════════════
var installPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();installPrompt=e;
  setTimeout(function(){
    showToast('📲 点击右上角菜单 → 添加到主屏幕');
  },3000);
});
// 双击标题栏触发安装
document.getElementById('header').addEventListener('dblclick',function(){
  if(installPrompt){installPrompt.prompt();installPrompt.userChoice.then(function(r){
    showToast(r.outcome==='accepted'?'✅ 安装成功！':'😅 下次再装吧~');
    installPrompt=null;
  })}
});
connectWS();
initVoice();
setEmotion('idle');
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    console.log('[PWA] SW注册成功:',reg.scope);
    // 订阅推送
    if('PushManager' in window){
      reg.pushManager.subscribe({userVisibleOnly:true}).then(function(sub){
        console.log('[PWA] 推送已订阅');
      }).catch(function(){});
    }
  }).catch(function(e){console.warn('[PWA] SW注册失败:',e)});
}
</script>
