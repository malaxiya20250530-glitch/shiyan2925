<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哪吒跳舞预览器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at center,#1a0a0a 0%,#000 100%);overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff}
canvas{display:block}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 18px;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.6);color:#fff;border-radius:25px;cursor:pointer;font-size:15px;backdrop-filter:blur(10px);transition:all .3s}
.btn:hover{border-color:#ff4400;box-shadow:0 0 20px rgba(255,68,0,0.4)}
.btn.active{border-color:#ff4400;background:rgba(255,68,0,0.3);box-shadow:0 0 30px rgba(255,68,0,0.6)}
#bpm-display{position:fixed;top:20px;right:20px;font-size:20px;color:#ff4400;text-shadow:0 0 10px rgba(255,68,0,0.5)}
#title{position:fixed;top:20px;left:20px;font-size:16px;opacity:0.7}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;color:#ff4400}
</style>
</head>
<body>
<div id="title">哪吒魔童降世 - 程序化舞蹈引擎</div>
<div id="bpm-display">BPM <span id="bpm-val">120</span></div>
<div id="loading-msg" class="loading">加载模型中...</div>
<div id="hud">
<button class="btn active" onclick="setStyle('idle')">待机</button>
<button class="btn" onclick="setStyle('chinese')">国风</button>
<button class="btn" onclick="setStyle('hiphop')">街舞</button>
<button class="btn" onclick="setStyle('fired_up')" style="border-color:#ff4400;">战</button>
<button class="btn" onclick="toggleBPM()">BPM</button>
</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,0.0003);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
camera.position.set(0,0.8,3.5);camera.lookAt(0,0.7,0);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x332211,1.5));
const key=new THREE.DirectionalLight(0xff9966,8);key.position.set(1,2,3);key.castShadow=true;scene.add(key);
scene.add(new THREE.DirectionalLight(0xff4400,3)).position.set(-1,1,-1);
scene.add(new THREE.DirectionalLight(0x3344ff,2)).position.set(0,-0.5,2);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0x111111,roughness:0.9}));
floor.rotation.x=-Math.PI/2;floor.position.y=-1.2;floor.receiveShadow=true;scene.add(floor);

function mkFireRing(y){
const c=60,g=new THREE.BufferGeometry(),p=new Float32Array(c*3),cl=new Float32Array(c*3);
for(let i=0;i<c;i++){const a=i/c*Math.PI*2,r=0.08+Math.random()*0.04;p[i*3]=Math.cos(a)*r;p[i*3+1]=Math.sin(a)*r;p[i*3+2]=(Math.random()-0.5)*0.02;cl[i*3]=0.5+Math.random()*0.5;cl[i*3+1]=Math.random()*0.3;cl[i*3+2]=Math.random()*0.3}
g.setAttribute('position',new THREE.BufferAttribute(p,3));g.setAttribute('color',new THREE.BufferAttribute(cl,3));
const m=new THREE.PointsMaterial({size:0.015,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false});
const r=new THREE.Points(g,m);r.position.y=y;return r}
const fL=mkFireRing(-0.1),fR=mkFireRing(-0.1);scene.add(fL);scene.add(fR);

const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,0.7,0);controls.enableDamping=true;controls.dampingFactor=0.08;
controls.minDistance=1.5;controls.maxDistance=8;controls.maxPolarAngle=Math.PI*0.8;controls.update();

function mkPart(geo,mat,x,y,z,rx=0,ry=0,rz=0,sx=1,sy=1,sz=1){
const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);m.rotation.set(rx,ry,rz);m.scale.set(sx,sy,sz);m.castShadow=true;return m}

const group=new THREE.Group();
const skin=new THREE.MeshStandardMaterial({color:0xf5e6d3,roughness:0.5});
const red=new THREE.MeshStandardMaterial({color:0xcc2222,roughness:0.7});
const black=new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.5});
const gray=new THREE.MeshStandardMaterial({color:0x4a4a5a,roughness:0.8});
const gold=new THREE.MeshStandardMaterial({color:0xdaa520,roughness:0.2,metalness:0.9});
const eyeMat=new THREE.MeshStandardMaterial({color:0x000000,roughness:0.2});

const bodyGeo=new THREE.CapsuleGeometry(0.18,0.3,4,8);
const headGeo=new THREE.SphereGeometry(0.15,16,16);
const limbGeo=new THREE.CapsuleGeometry(0.04,0.22,4,8);
const legGeo=new THREE.CapsuleGeometry(0.05,0.25,4,8);
const footGeo=new THREE.BoxGeometry(0.1,0.05,0.15);

group.add(mkPart(bodyGeo,red,0,0.55,0));
group.add(mkPart(headGeo,skin,0,0.95,0));
group.add(mkPart(new THREE.SphereGeometry(0.03,8,8),eyeMat,-0.05,1.0,-0.13));
group.add(mkPart(new THREE.SphereGeometry(0.03,8,8),eyeMat,0.05,1.0,-0.13));
group.add(mkPart(new THREE.TorusGeometry(0.06,0.03,8,8),black,-0.12,1.12,0,Math.PI/2,0,0));
group.add(mkPart(new THREE.TorusGeometry(0.06,0.03,8,8),black,0.12,1.12,0,Math.PI/2,0,0));
group.add(mkPart(new THREE.TorusGeometry(0.35,0.02,8,32),new THREE.MeshStandardMaterial({color:0xcc2222,roughness:0.4,emissive:0x330000}),0,0.7,0,Math.PI/3,0,0));
group.add(mkPart(new THREE.TorusGeometry(0.05,0.015,8,16),gold,0.2,0.5,-0.05));
group.add(mkPart(limbGeo,skin,0.2,0.72,0));
group.add(mkPart(limbGeo,skin,-0.2,0.72,0));
group.add(mkPart(limbGeo,skin,0.32,0.55,0));
group.add(mkPart(limbGeo,skin,-0.32,0.55,0));
group.add(mkPart(legGeo,gray,0.07,0.3,0));
group.add(mkPart(legGeo,gray,-0.07,0.3,0));
group.add(mkPart(legGeo,gray,0.07,0.08,0));
group.add(mkPart(legGeo,gray,-0.07,0.08,0));
group.add(mkPart(footGeo,gray,0.08,0.05,0));
group.add(mkPart(footGeo,gray,-0.08,0.05,0));

scene.add(group);
document.getElementById('loading-msg').style.display='none';

let bpm=120,beatTime=0,energy=1,styleBlend=0.1,firedUp=false;
const getBD=()=>60/bpm;
let lastT=0;

function animate(t){
requestAnimationFrame(animate);
const dt=Math.min(t*0.001-lastT,0.05);lastT=t*0.001;
if(dt<=0)return;
const e=energy;beatTime+=dt*e;
const bd=getBD()/e,ph=(beatTime%bd)/bd;
const sb=Math.sin(ph*Math.PI*2),cb=Math.cos(ph*Math.PI*2);

group.rotation.z=sb*0.1*e;
group.position.y=Math.abs(sb)*0.03*e;
group.scale.setScalar(firedUp?1+Math.abs(sb)*0.08:1);
group.rotation.x=sb*0.08*e;

if(styleBlend>0.5){const sp=(styleBlend-0.5)*2;group.rotation.y+=dt*sp*(firedUp?3:1)}
else group.rotation.y=Math.sin(beatTime*0.5)*0.3*e;

const ws=t*0.01*(firedUp?15:8);
fL.rotation.y=ws;fR.rotation.y=ws;fL.position.set(-0.08,-0.08,0);fR.position.set(0.08,-0.08,0);
const fs=1+Math.abs(sb)*(firedUp?1.5:0.5);fL.scale.setScalar(fs);fR.scale.setScalar(fs);
const fc=firedUp?0xff4400:0x00ccff;fL.material.color.setHex(fc);fR.material.color.setHex(fc);

controls.update();renderer.render(scene,camera);
document.getElementById('bpm-val').textContent=Math.round(bpm*e);
}

window.setStyle=s=>{
document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
const bs=document.querySelectorAll('.btn');
switch(s){
case'idle':energy=1;styleBlend=0.1;firedUp=false;bs[0].classList.add('active');bpm=100;break
case'chinese':energy=1;styleBlend=0.2;firedUp=false;bs[1].classList.add('active');bpm=110;break
case'hiphop':energy=1.3;styleBlend=0.9;firedUp=false;bs[2].classList.add('active');bpm=130;break
case'fired_up':energy=2;styleBlend=1;firedUp=true;bs[3].classList.add('active');bpm=150;break
}};
window.toggleBPM=()=>{const v=[80,100,120,140,160];bpm=v[(v.indexOf(bpm)+1)%v.length]};

requestAnimationFrame(animate);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
