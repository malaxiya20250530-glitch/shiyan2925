name: "跨平台编译 Cython 二进制"

on:
  push:
    branches: [master]
    paths:
      - 'build_binaries.py'
      - 'hallucination_detector.pye'
      - 'checker_classes.pye'
      - 'checker_registry.pye'
      - 'knowledge_graph.pye'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解密源码 (.pye → .py)
        run: |
          echo "${{ secrets.ENCRYPT_KEY }}" > .encrypt_key
          chmod 600 .encrypt_key
          python3 encrypt_stdlib.py --decrypt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install cython
      - run: python3 build_binaries.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: "*.cpython-*-linux-gnu.so"
          if-no-files-found: ignore

  release:
    if: github.event_name == 'release'
    needs: [linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - run: |
          mkdir -p out
          for d in dist/*/; do
            name=$(basename "$d")
            (cd dist && zip -r "../out/${name}.zip" "$name")
          done
          ls -la out/
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
