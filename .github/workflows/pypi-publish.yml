name: 发布到 PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC 必需
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装构建工具
        run: pip install build
      - name: 构建包
        run: python3 -m build
      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
