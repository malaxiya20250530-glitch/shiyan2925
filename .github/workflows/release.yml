name: 发布 GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 构建包
        run: |
          pip install build
          python3 -m build
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
