name: Enterprise CD Gate

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Decrypt source
        run: |
          echo "${{ secrets.ENCRYPT_KEY }}" > .encrypt_key
          chmod 600 .encrypt_key
          python3 encrypt_stdlib.py --decrypt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Unit tests
        run: python3 test_fact_checker.py
      - name: CLI smoke test
        run: |
          python3 hallucination_detector.py "朱元璋发明了火锅" | grep '矛盾'
          python3 hallucination_detector.py "毕昇发明了活字印刷术" | grep '可信度'
          echo "Smoke test passed"
