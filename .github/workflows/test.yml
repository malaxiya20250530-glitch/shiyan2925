name: 测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装 Tesseract（OCR 支持）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-chi-sim 2>/dev/null || echo "Tesseract 中文包不可用，跳过"

      - name: 初始化反馈数据库
        run: python3 -c "import feedback_store; feedback_store.init_db()"

      - name: 运行全部测试
        run: |
          echo "=== 幻觉检测 ===" && python3 test_fact_checker.py
          echo "=== 反馈库 ===" && python3 test_feedback_store.py
          echo "=== KB管理 ===" && python3 test_update_kb.py
          echo "=== 安全观察 ===" && python3 test_observer_security.py
          echo "=== 对齐分析 ===" && python3 test_alignment_middleware.py
          echo "=== 观察代理 ===" && python3 test_observer_proxy.py
          echo "=== 仪表盘 ===" && python3 test_feedback_dashboard.py
          echo "=== 压力测试 ===" && python3 test_stress.py
          echo "=== 向量检索 ===" && python3 test_vector_kb.py

      - name: 语法检查
        run: |
          python3 -c "import hallucination_detector, awareness_gateway, observer_proxy, observer_security, alignment_middleware, feedback_store, feedback_dashboard, update_kb, logger, vector_kb, web_verifier, ocr_handler, langchain_plugin"
          echo "全部模块导入成功"

      - name: OCR 演示
        run: |
          python3 ocr_handler.py --text '朱元璋发明了火锅' > /tmp/ocr.json
          python3 -c 'import json; d=json.load(open("/tmp/ocr.json")); print("OCR:", d.get("claims_count",0), "claims")'

      - name: Gateway 启动
        run: |
          python3 awareness_gateway.py --mock --port 8800 &
          sleep 2
          curl -s http://localhost:8800/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'; print('Gateway OK')"
          curl -s -X POST http://localhost:8800/ocr -H "Content-Type: application/json" -d '{"text":"test"}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'OCR端点 OK')"
          kill %1
