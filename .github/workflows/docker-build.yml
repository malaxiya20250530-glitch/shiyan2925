name: "Docker 构建验证"

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '*.py'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 构建 Docker 镜像
        run: docker build -t awareness-gateway .
      - name: 启动并验证 Gateway
        run: |
          docker run -d --name gateway-test -p 8800:8800 awareness-gateway
          sleep 5
          curl -s --max-time 10 http://localhost:8800/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'; print('✅ Gateway OK')"
          docker stop gateway-test && docker rm gateway-test
