name: 🔥 灵绘云编译

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── 脚本校验 ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Python 语法校验
        run: |
          echo "### Python 校验" >> $GITHUB_STEP_SUMMARY
          find ai-desktop-pet -name "*.py" | while read f; do
            if python3 -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>/dev/null; then
              echo "✅ $f" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $f" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 🎮 C# 语法校验
        run: |
          echo "### C# 校验" >> $GITHUB_STEP_SUMMARY
          find ai-desktop-pet/unity -name "*.cs" | while read f; do
            # 用 mcs 或 dotnet 做语法检查
            if command -v mcs &>/dev/null; then
              mcs -target:library -out:/dev/null "$f" 2>/dev/null && echo "✅ $f" >> $GITHUB_STEP_SUMMARY || echo "⚠️ $f" >> $GITHUB_STEP_SUMMARY
            else
              lines=$(wc -l < "$f")
              classes=$(grep -c "class " "$f" || true)
              echo "📄 $f (${lines}行, ${classes}类)" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 🎨 Shader 语法检查
        run: |
          echo "### Shader" >> $GITHUB_STEP_SUMMARY
          find ai-desktop-pet -name "*.shader" | while read f; do
            wc -l < "$f" | xargs -I{} echo "📄 $f ({}行)" >> $GITHUB_STEP_SUMMARY
          done

  # ── 打包发布 ──
  package:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 打包 Unity 脚本
        run: |
          mkdir -p release/LingHui-Nezha
          cp -r ai-desktop-pet/unity/* release/LingHui-Nezha/
          cp ai-desktop-pet/unity_project/Assets/Scripts/*.cs release/LingHui-Nezha/ 2>/dev/null || true
          # 打包
          cd release
          zip -r LingHui-Nezha-Unity.zip LingHui-Nezha/
          echo "📦 Unity 脚本包: $(du -h LingHui-Nezha-Unity.zip | cut -f1)" >> $GITHUB_STEP_SUMMARY

      - name: 📦 打包预览器
        run: |
          mkdir -p release/preview
          cp ai-desktop-pet/preview/nezha_dance_viewer.html release/preview/
          cp ai-desktop-pet/preview/nezha_terminal_dance.py release/preview/
          cp ai-desktop-pet/preview/voice/*.wav release/preview/ 2>/dev/null || true
          cd release
          zip -r LingHui-Preview.zip preview/
          echo "📦 预览器包: $(du -h LingHui-Preview.zip | cut -f1)" >> $GITHUB_STEP_SUMMARY

      - name: 📤 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: LingHui-Nezha-Release
          path: release/*.zip
          retention-days: 90

      - name: 📋 构建摘要
        run: |
          echo "## 🔥 灵绘构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 组件 | 文件数 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unity C# | $(ls ai-desktop-pet/unity/*.cs ai-desktop-pet/unity_project/Assets/Scripts/*.cs 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Shader | $(ls ai-desktop-pet/unity/*.shader 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | $(ls ai-desktop-pet/tools/*.py ai-desktop-pet/backend/*.py 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| 语音包 | $(ls ai-desktop-pet/preview/voice/*.wav 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 下载 ZIP 后拖入 Unity 项目即可" >> $GITHUB_STEP_SUMMARY
