name: 🔥 灵绘 APK 云编译

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: 📱 打包 PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 打包灵绘 PWA
        run: |
          mkdir -p release/linghui-pwa
          cp ai-desktop-pet/preview/nezha_dance_viewer.html release/linghui-pwa/index.html
          cp ai-desktop-pet/preview/manifest.json release/linghui-pwa/
          cp ai-desktop-pet/preview/sw.js release/linghui-pwa/
          cp ai-desktop-pet/preview/voice/*.wav release/linghui-pwa/voice/ 2>/dev/null || true
          cd release && zip -r LingHui-PWA.zip linghui-pwa/

      - name: 📤 上传
        uses: actions/upload-artifact@v4
        with:
          name: LingHui-PWA
          path: release/LingHui-PWA.zip
          retention-days: 90

      - name: 📋 报告
        run: |
          echo "### 🔥 灵绘 PWA" >> $GITHUB_STEP_SUMMARY
          echo "解压后用 Chrome 打开 index.html → 添加到主屏幕" >> $GITHUB_STEP_SUMMARY
